  # Set force charge timeout (one-time)
  - id: "ev_force_charge_set_timeout"
    alias: "EV Force Charge - Set 8 Hour Timeout"
    description: "Set timeout when force charge activated"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: input_boolean.ev_force_charge_once
        to: "on"
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ev_force_charge_timeout
        data:
          datetime: "{{ (now() + timedelta(hours=8)).strftime('%Y-%m-%d %H:%M:%S') }}"

  # Auto-disable force charge on timeout
  - id: "ev_force_charge_auto_disable_timeout"
    alias: "EV Force Charge Auto Disable on 8 Hour Timeout"
    description: "Automatically disable after 8 hours"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: time_pattern
        minutes: "/1"
    conditions:
      - condition: state
        entity_id: input_boolean.ev_force_charge_once
        state: "on"
      - condition: template
        value_template: "{{ states('input_datetime.ev_force_charge_timeout') not in ['unknown', 'unavailable', 'none'] }}"
      - condition: template
        value_template: "{{ now() | as_timestamp >= (states('input_datetime.ev_force_charge_timeout') | as_timestamp) }}"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_force_charge_once
      - action: notify.mobile_app_dennis_mobile
        data:
          title: "EV Force Charge Timeout"
          message: "Force charge once disabled after 8 hours"
          data:
            priority: high
            tag: ev_force_timeout
            color: orange

  # Auto-disable force charge (once) when full
  - id: "ev_force_charge_auto_disable_full"
    alias: "EV Force Charge (Once) Auto Disable on Full"
    description: "Disable when battery reaches force charge limit"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: template
        value_template: >
          {% set limit = states('input_number.ev_charging_limit_force') | int(1) %}
          {{ (states('sensor.skoda_elroq_battery_percentage') | int(0)) >= (limit - 1) and is_state('input_boolean.ev_force_charge_once', 'on') }}
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_force_charge_once
      - action: notify.mobile_app_dennis_mobile
        data:
          title: "EV Force Charge Complete (one-time)"
          message: "Car fully charged"
          data:
            priority: high
            tag: ev_force_complete
            color: green

  # Activate permanent force charging
  - id: "ev_force_charge_permanent_activate"
    alias: "EV Force Charge Permanent - Activate"
    description: "Activate permanent force charging mode"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: input_boolean.ev_force_charge_permanent
        to: "on"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_force_charge_once
      - action: notify.mobile_app_dennis_mobile
        data:
          title: "EV Permanent Force Charge Activated"
          message: "Permanent force charging enabled - One-time force charging disabled"
          data:
            priority: high
            tag: ev_permanent_force_active
            color: red

  # Deactivate permanent force charging
  # Idea: also create one for manual override (with additional daily check?)
  - id: "ev_force_charge_permanent_deactivate"
    alias: "EV Force Charge Permanent - Deactivate"
    description: "Deactivate permanent force charging mode"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: input_boolean.ev_force_charge_permanent
        to: "off"
    actions:
      - action: notify.mobile_app_dennis_mobile
        data:
          title: "EV Permanent Force Charge Deactivated"
          message: "Permanent force charging disabled - automations resumed but might not be enabled"
          data:
            priority: high
            tag: ev_permanent_force_inactive
            color: green

  # Force charge activation - configure charger and optionally start charging
  - id: "ev_force_charge_override_enabled"
    alias: "EV Force Charge Override Enabled"
    description: "Handle force charge activation - always configure charger, start charging only if cable connected"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: input_boolean.ev_force_charge_once
        to: "on"
      - trigger: state
        entity_id: input_boolean.ev_force_charge_permanent
        to: "on"
    conditions:
      - condition: state
        entity_id: input_boolean.ev_manual_override
        state: "off"
    actions:
      - action: switch.turn_off
        target:
          entity_id: switch.peblar_ev_charger_force_single_phase
      - action: number.set_value
        target:
          entity_id: number.peblar_ev_charger_charge_limit
        data:
          value: 16
      - action: switch.turn_on
        target:
          entity_id: switch.peblar_ev_charger_charge
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.ev_is_connected
                state: "on"
              # - condition: template
              #   value_template: "{{ states('sensor.peblar_ev_charger_state') not in ['unavailable', 'unknown', 'no_ev_connected'] }}"
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.skoda_elroq_charge_limit # probably also handled by ev charge validation automation
                data:
                  value: "{{ states('input_number.force_charging_limit_percent') | int(100) }}"
              ## Not needed? Automation might get stuck when Car API is non-responsive
              - action: switch.turn_on
                target:
                  entity_id: switch.skoda_elroq_charging
              - action: notify.mobile_app_dennis_mobile
                data:
                  title: "EV Force Charge Activated"
                  message: "Maximum charging at 3-phase 16A"
                  data:
                    priority: high
                    tag: ev_force_active
                    color: red
          - conditions:
              - condition: state
                entity_id: binary_sensor.ev_is_connected
                state: "off"
            sequence:
              - action: notify.mobile_app_dennis_mobile
                data:
                  title: "EV Force Charge - Cable Not Connected"
                  message: "Charger configured to 3-phase 16A. Please connect cable to start charging."
                  data:
                    priority: high
                    tag: ev_force_cable_missing
                    color: orange

  # Validate charging limit
  # reduce triggers / API calls further
  - id: "ev_validate_charging_limit"
    alias: "EV Validate Charging Limit"
    description: "Validate and reset charging limit"
    mode: single
    max_exceeded: silent
    triggers:
      # - trigger: time_pattern
      #   minutes: "/10" # was /2
      - trigger: state # trigger on any state change
        entity_id: 
          - sensor.skoda_elroq_target_battery_percentage
      - trigger: state # trigger any state not not to unknown
        entity_id: sensor.ev_expected_charging_limit
        not_to: "unknown"
      - trigger: state # trigger on 'on' state
        entity_id:
          - binary_sensor.skoda_elroq_charger_connected
          - input_boolean.ev_force_charge_permanent
          - input_boolean.ev_force_charge_once
          - input_boolean.ev_solar_charging
          - input_boolean.ev_window_charging
          - binary_sensor.ev_is_charging
          - binary_sensor.ev_is_connected
        to: "on"
      - trigger: state # trigger on 'off' state
        entity_id: input_boolean.ev_manual_override
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.ev_manual_override
        state: "off"
      - condition: state
        entity_id: binary_sensor.ev_is_connected
        state: "on"
      - condition: template
        value_template: >
          {% set current_limit = states('sensor.skoda_elroq_target_battery_percentage') | int %}
          {% set expected_limit = states('sensor.ev_expected_charging_limit') | int %}
          {{ current_limit != expected_limit }}
    actions:
      - variables:
          expected_limit: "{{ states('sensor.ev_expected_charging_limit') | int }}"
          current_limit: "{{ states('sensor.skoda_elroq_target_battery_percentage') | int }}"
      - action: number.set_value
        target:
          entity_id: number.skoda_elroq_charge_limit
        data:
          value: "{{ expected_limit }}"
      - action: notify.mobile_app_dennis_mobile
        data:
          title: "EV Charging Limit Corrected"
          message: "Corrected from {{ current_limit }}% to {{ expected_limit }}%"
          data:
            priority: high
            tag: ev_limit_corrected
            color: yellow

  # Charging complete notification
  # Not much testing so far!
  - id: "ev_charging_complete_notification"
    alias: "EV Charging Complete Notification"
    description: "Notify when EV reaches configured charge limit"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: numeric_state
        entity_id: sensor.skoda_elroq_battery_percentage
        above: 99
      - trigger: template
        value_template: >-
          {{
            states('sensor.skoda_elroq_battery_percentage') | int(0)
            >=
            states('sensor.ev_expected_charging_limit') | int(101)
          }}
    condition:
      - condition: state
        entity_id: binary_sensor.ev_is_connected
        state: "on"
      - condition: state
        entity_id: input_boolean.ev_force_charge_permanent
        state: "off"
    actions:
      - action: notify.mobile_app_dennis_mobile
        data:
          title: "EV Charging Complete"
          message: >-
            Your Elroq has reached the set charging limit of
            {{ states('sensor.ev_expected_charging_limit') }}%
            (current: {{ states('sensor.skoda_elroq_battery_percentage') }}%).
          data:
            priority: high
            tag: ev_complete
            color: green

  - id: ev_charger_error_notification
    alias: "EV Charger Error Notification"
    description: "Send notification when Peblar charger is in unfeasible state."
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.peblar_ev_charger_state
        to:
          - "error"
          - "fault"
          - "invalid"
    actions:
      - action: notify.mobile_app_dennis_mobile
        data:
          title: "EV Charger in unexpected state"
          message: "Peblar in state '{{ trigger.to_state.state }}'. Please check ASAP!"
          data:
            priority: high
            tag: ev_charger_in_error
            color: red

  - id: ev_generic_charging_mode_control
    alias: "EV Generic Charge Mode Control"
    description: "Controls charger based on charging mode (except Solar)"
    mode: restart # Reset timer when optimal phase mode is changed

    # when does it stop if ev_charging is disabled?
    # if mode changes from something else then none, when will it stop?
    # add variables? including expected target limit source
    # Add trigger when source limit is switched to solar ?

    triggers:
      - trigger: state
        entity_id: sensor.ev_charging_mode
        to:
          - "force"
          - "cheapest"
          - "window"
        id: mode_full_power
        for: "00:00:30"
        # not_from:
        #   - "unknown"
        #   - "unavailable"
      - trigger: state
        entity_id: sensor.ev_charging_mode
        to:
          - "none"
        id: mode_none
        for: "00:00:30"
        # not_from:
        #   - "unknown"
        #   - "unavailable"
    conditions: # some disabled for testing?
      - condition: state
        entity_id: input_boolean.ev_manual_override
        state: "off"
      - condition: state # do not use as this causes things not to work!
        entity_id: binary_sensor.ev_is_connected
        state: "on"
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: mode_full_power
            sequence:
              - action: number.set_value # maximize power
                target:
                  entity_id: number.peblar_ev_charger_charge_limit
                data:
                  value: 16
              - action: switch.turn_off # switch to 3-phase mode
                target:
                  entity_id: switch.peblar_ev_charger_force_single_phase
              - action: switch.turn_on # allow charging
                target:
                  entity_id: switch.peblar_ev_charger_charge
          - conditions:
              - condition: trigger
                id: mode_none
            sequence:
              - action: switch.turn_off # Stop charging if no mode is selected
                target:
                  entity_id: switch.peblar_ev_charger_charge