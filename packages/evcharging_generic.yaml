### Generic EV stuff

## Input helpers

input_number:
  ev_battery_capacity_kwh:
    name: "EV Battery Capacity"
    unit_of_measurement: "kWh"
    min: 50
    max: 100
    step: 1
    icon: mdi:battery-high

  ev_charger_max_power_kw:
    name: "EV Charger Maximum Power"
    unit_of_measurement: "kW"
    min: 6
    max: 11
    step: 1
    icon: mdi:lightning-bolt-circle

  ev_charging_efficiency_percent:
    name: "EV Charging Efficiency"
    unit_of_measurement: "%"
    min: 80
    max: 100
    step: 1
    icon: mdi:percent

  ev_power_buffer_watts:
    name: "EV Power Buffer"
    unit_of_measurement: "W"
    min: -7000 # was -2000 but changed for testing phases
    max: 2000
    step: 100
    icon: mdi:shield-check

  ev_charging_limit_force:
    name: "EV Charging Limit Force"
    unit_of_measurement: "%"
    min: 50
    max: 100
    step: 10
    icon: mdi:lightning-bolt-circle

input_boolean:
  ev_manual_override:
    name: "EV Manual Override"
    icon: mdi:hand-back-left

  ev_force_charge_once:
    name: "EV Force Charge (One-Time)"
    icon: mdi:lightning-bolt

  ev_force_charge_permanent:
    name: "EV Force Charge Permanent"
    icon: mdi:lightning-bolt-circle

  ev_charge_prefer_tariff_over_solar:
    name: "EV Charge prefer Tariff over Solar"
    icon: mdi:sun-clock-outline

input_datetime:
  ev_force_charge_timeout:
    name: "EV Force Charge Timeout"
    has_date: true
    has_time: true
    icon: mdi:timer-sand

## Templates & sensors

template:
  - binary_sensor:
      - name: "EV is Charging"
        unique_id: ev_is_charging
        state: "{{ is_state('sensor.peblar_ev_charger_state', 'charging') }}"
      - name: "EV is Connected"
        unique_id: ev_is_connected
        state: "{{ not is_state('sensor.peblar_ev_charger_state', 'no_ev_connected') and not is_state('sensor.peblar_ev_charger_state', 'unknown') and not is_state('sensor.peblar_ev_charger_state', 'unavailable') }}"
        # state: "{{ is_state('sensor.peblar_ev_charger_state', 'evcharging') or is_state('sensor.peblar_ev_charger_state', 'suspended') }}"

        # 
  - sensor:
      # Determine expected charging limit
      # Ideas:
      # - Maybe let Window win if battery percentage is not met?
      # - Or let Window win when in cheapest hours (not just window)
      # - Or let Window win when in cheapest hours (not just window) and less than 10% difference?
      # - Maybe include 'expected solar left' as well
      - name: "EV Expected Charging Limit"
        unique_id: ev_expected_charging_limit
        unit_of_measurement: "%"
        state: >
          {% set is_force_charging = is_state('input_boolean.ev_force_charge_once', 'on') or is_state('input_boolean.ev_force_charge_permanent', 'on')  %}
          {% set is_window_active = is_state('sensor.ev_charging_window_active', 'true') and is_state('input_boolean.ev_window_charging', 'on') %}
          {% set is_in_cheapest_window = is_state('sensor.ev_is_in_cheapest_window', 'true') %}
          {% set prefer_tariff_over_solar = is_state('input_boolean.ev_charge_prefer_tariff_over_solar', 'on') %}
          {% set solar_enabled = is_state('input_boolean.ev_solar_charging', 'on') %}
          {% set sun_up = is_state('sun.sun', 'above_horizon') %}

          {% if is_force_charging %}
            {{ states('input_number.ev_charging_limit_force') | int }}
          {% elif solar_enabled and prefer_tariff_over_solar and is_window_active and is_in_cheapest_window %} 
            {{ states('input_number.ev_charging_limit_window') | int }}
          {% elif solar_enabled and sun_up %}
            {{ states('input_number.ev_charging_limit_solar') | int }}
          {% elif is_window_active and tarif_optimization and is_in_cheapest_window %}
            {{ states('input_number.ev_charging_limit_window') | int }}
          {% elif is_window_active and not tarif_optimization  %}
            {{ states('input_number.ev_charging_limit_window') | int }}
          {% endif %}


      - name: "EV Charging Mode"
        unique_id: ev_charging_mode
        state: >
          {% set is_force_charging = is_state('input_boolean.ev_force_charge_once', 'on') or is_state('input_boolean.ev_force_charge_permanent', 'on')  %}
          {% set is_window_active = is_state('sensor.ev_charging_window_active', 'true') and is_state('input_boolean.ev_window_charging', 'on') %}
          {% set is_in_cheapest_window = is_state('sensor.ev_is_in_cheapest_window', 'true') %}
          {% set prefer_tariff_over_solar = is_state('input_boolean.ev_charge_prefer_tariff_over_solar', 'on') %}
          {% set tarif_optimization = is_state('input_boolean.ev_dynamic_tariff_optimization', 'on') %}
          {% set solar_enabled = is_state('input_boolean.ev_solar_charging', 'on') %}
          {% set sun_up = is_state('sun.sun', 'above_horizon') %}

          {% if is_force_charging %}
            force
          {% elif solar_enabled and prefer_tariff_over_solar and is_window_active and is_in_cheapest_window %} 
            cheapest
          {% elif solar_enabled and sun_up %}
            solar
          {% elif is_window_active and tarif_optimization and is_in_cheapest_window %}
            cheapest
          {% elif is_window_active and not tarif_optimization  %}
            window
          {% else %}
            none
          {% endif %}

      # Debug sensor - to be decided if this is really required.
      - name: "EV Debug Solar Values"
        unique_id: ev_debug_solar_values
        state: "OK"
        attributes:
          solar: "{{ (states('sensor.envoy_122109029426_current_power_production') | float(0) * 1000) + states('sensor.solaredge_ac_power') | float(0) }} W"
          excess: "{{ states('sensor.grid_excess_power') }} W"

